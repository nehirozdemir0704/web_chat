databases:
  - name: web-chat-db
    databaseName: web_chat
    user: web_chat_user
    plan: free

services:
  - type: web
    name: web-chat-community
    runtime: docker
    plan: free
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: web-chat-db
          property: connectionString
