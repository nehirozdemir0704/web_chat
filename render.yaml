databases:
  - name: web-chat-db
    databaseName: web_chat
    user: web_chat_user
    plan: free

services:
  - type: web
    name: web-chat-community
    runtime: docker
    plan: free
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: web-chat-db
          property: connectionString
      - key: PUBLIC_URL
        value: https://web-chat-community.onrender.com
      - key: RESEND_API_KEY
        sync: false
      - key: MAIL_FROM
        sync: false
