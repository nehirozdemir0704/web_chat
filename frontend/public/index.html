<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebSocket Chat - Discord Clone</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-900 text-white h-screen">
  <div id="app" class="flex h-screen">
    <!-- Sidebar -->
    <aside id="sidebar" class="w-64 bg-gray-800 flex flex-col p-4">
      <div class="flex items-center mb-6">
        <span class="text-2xl font-bold">Channels</span>
        <button id="createChannelBtn" class="ml-auto bg-blue-600 px-2 py-1 rounded hover:bg-blue-700">+</button>
      </div>
      <ul id="channelList" class="flex-1 space-y-2 overflow-y-auto"></ul>
      <div class="mt-6">
        <button id="logoutBtn" class="w-full bg-red-600 py-1 rounded hover:bg-red-700">Logout</button>
      </div>
    </aside>
    <!-- Chat Area -->
    <main class="flex-1 flex flex-col">
      <header class="bg-gray-800 px-6 py-3 flex items-center justify-between">
        <span id="currentChannel" class="text-xl font-semibold">#general</span>
        <button id="inviteBtn" class="bg-green-600 px-3 py-1 rounded hover:bg-green-700 hidden">Invite</button>
      </header>
      <section id="chatArea" class="flex-1 overflow-y-auto p-6 space-y-2"></section>
      <footer class="bg-gray-800 px-6 py-3 flex">
        <input id="messageInput" class="flex-1 bg-gray-700 rounded px-3 py-2 mr-2" placeholder="Type a message..." autocomplete="off" />
        <button id="sendBtn" class="bg-blue-600 px-4 py-2 rounded hover:bg-blue-700">Send</button>
      </footer>
    </main>
  </div>
  <!-- Modals -->
  <div id="modalOverlay" class="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-50 hidden">
    <div id="modal" class="bg-gray-800 p-6 rounded shadow-lg w-80">
      <!-- Modal content will be injected here by app.js -->
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
